services:
  # Backend FastAPI Service
  - type: web
    name: skincare-api
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8000
      - key: PYTHON_VERSION
        value: 3.10.0

  # Frontend React/Vite Service
  - type: static
    name: skincare-frontend
    env: static
    buildCommand: npm install && npm run build
    publishDir: frontend/dist
    envVars:
      - key: VITE_API_BASE
        fromService:
          type: web
          name: skincare-api
          property: host
        # The fromService property will give us the internal host. 
        # For a full public URL, Render automatically prepends https:// and appends .onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
